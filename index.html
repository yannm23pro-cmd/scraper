<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Domaines Expirés</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Pépites SEO : Domaines Expirés
            </h1>
            <p class="mt-2 text-slate-400">Mis à jour automatiquement toutes les 12 heures</p>
        </header>

        <div class="bg-slate-800 border border-slate-700 rounded-xl shadow-xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-700/50">
                    <tr>
                        <th class="p-4 font-semibold">Nom du Domaine</th>
                        <th class="p-4 font-semibold text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="domain-list" class="divide-y divide-slate-700">
                    </tbody>
            </table>
            <div id="loading" class="p-10 text-center text-slate-500 italic">
                Recherche des domaines dans la base...
            </div>
        </div>
    </div>

    <script>
        // Remplace par TES propres valeurs (celles de ton onglet API Supabase)
        const MY_SUPABASE_URL = 'https://fdhmfntdbzdhioxwtdem.supabase.co';
        const MY_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkaG1mbnRkYnpkaGlveHd0ZGVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDE5MTAsImV4cCI6MjA4NzUxNzkxMH0.YqSYShrPAmpX_qpYRY44lcHHyqr_tSpvDJDKeZAq0DU';

     // 2. Initialisation
        // Note : On utilise bien les variables définies juste au-dessus
        const supabaseClient = supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_KEY);

        async function fetchDomains() {
            console.log("Tentative de récupération des domaines...");
            
            const { data, error } = await supabaseClient
                .from('domains') 
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('domain-list');
            const loader = document.getElementById('loading');

            if (error) {
                console.error("Erreur Supabase détaillée:", error);
                loader.innerText = "Erreur : " + error.message;
                return;
            }

            if (data && data.length > 0) {
                loader.classList.add('hidden');
                list.innerHTML = ""; 
                data.forEach(domain => {
                    const row = `
                        <tr class="hover:bg-slate-700/30 transition-colors border-b border-slate-700">
                            <td class="p-4 font-mono text-emerald-400 font-bold">${domain.domain_name}</td>
                            <td class="p-4 text-center text-slate-300">
                                ${domain.created_at ? new Date(domain.created_at).toLocaleDateString() : '-'}
                            </td>
                            <td class="p-4 text-center">
                                <a href="https://www.godaddy.com/fr-fr/domaine/recherche?domainToCheck=${domain.domain_name}" 
                                   target="_blank" 
                                   class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all inline-block">
                                   Vérifier
                                </a>
                            </td>
                        </tr>
                    `;
                    list.innerHTML += row;
                });
            } else {
                loader.innerText = "La table est connectée mais semble vide.";
            }
        }

        // Lancement de la fonction
        fetchDomains();
    </script>
